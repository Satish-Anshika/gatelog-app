<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard - GateLog</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Gate<span>Log</span> Security</div>
        <div class="nav-links">
            <a href="lost-found.html">Lost & Found</a>
            <a href="#" id="logout-btn">Logout</a>
        </div>
    </nav>
    <div class="dashboard-container">
        
        <div class="grid">
            <!-- Add Parcel Section -->
            <div class="card glass-panel" style="grid-column: span 1;">
                <h2 class="golden-text mb-2">Log New Parcel</h2>
                <form id="add-parcel-form">
                    <div id="parcel-msg" class="alert hidden"></div>
                    
                    <div class="form-group">
                        <label>Student Phone Number</label>
                        <input type="text" id="parcel-phone" class="form-control" required placeholder="User's unique phone">
                    </div>
                    <div class="form-group">
                        <label>Student Name</label>
                        <input type="text" id="parcel-name" class="form-control" required placeholder="For verification">
                    </div>
                    <div class="form-group">
                        <label>Gate Assignment</label>
                        <select id="parcel-gate" class="form-control" required>
                            <option value="Gate 1">Gate 1</option>
                            <option value="Gate 2">Gate 2</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add Parcel</button>
                </form>
            </div>

            <!-- Verify Pickup Section -->
            <div class="card glass-panel" style="grid-column: span 1;">
                <h2 class="golden-text mb-2">Verify Pickup (Barcode)</h2>
                <form id="verify-parcel-form">
                    <div id="verify-msg" class="alert hidden"></div>
                    
                    <div class="form-group">
                        <label>Scan / Enter Barcode ID</label>
                        <input type="text" id="verify-barcode" class="form-control" required placeholder="e.g. BAR-123456">
                    </div>
                    <button type="submit" class="btn-primary" style="background-color: var(--success); color: #fff;">Mark as Delivered</button>
                </form>
            </div>
        </div>

        <h2 class="mt-3 mb-2">Pending Parcels at Gates</h2>
        <div id="parcels-list" class="grid">
            <!-- Dynamically populated -->
        </div>

    </div>
    <script type="module" src="js/security.js"></script>
</body>
</html>
