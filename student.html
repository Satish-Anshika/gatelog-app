<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - GateLog</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Gate<span>Log</span></div>
        <div class="nav-links">
            <a href="lost-found.html">Lost & Found</a>
            <a href="#" id="logout-btn">Logout</a>
        </div>
    </nav>
    <div class="dashboard-container">
        
        <div class="mb-3">
            <h2>Welcome, <span id="student-name" class="golden-text">Student</span></h2>
            <p class="text-muted">Here are your pending parcels at the gates.</p>
        </div>

        <div id="student-parcels" class="grid">
            <!-- Dynamically populated -->
        </div>

        <h2 class="mt-3 mb-2">Collection History</h2>
        <div id="student-history" class="grid">
            <!-- Dynamically populated -->
        </div>

    </div>
    <script type="module" src="js/student.js"></script>
</body>
</html>
