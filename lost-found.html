<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found - GateLog</title>
    <link rel="stylesheet" href="css/style.css">
  
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Gate<span>Log</span></div>
        <div class="nav-links">
            <a href="#" id="back-btn">Back to Dashboard</a>
        </div>
    </nav>
    <div class="dashboard-container">
        
        <div class="grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
            
            <div class="card glass-panel text-center mb-3">
                <h2 class="golden-text mb-2">Report Lost/Found Item</h2>
                <form id="report-item-form">
                    <div id="report-msg" class="alert hidden"></div>
                    
                    <div class="role-toggle">
                        <input type="radio" id="type-lost" name="item-type" value="lost" checked>
                        <label for="type-lost">I Lost Something</label>
                        <input type="radio" id="type-found" name="item-type" value="found">
                        <label for="type-found">I Found Something</label>
                    </div>

                    <div class="form-group">
                        <label>Item Description (Include distinct features)</label>
                        <input type="text" id="item-desc" class="form-control" required placeholder="e.g. Black Lenovo Thinkpad...">
                    </div>
                    
                    <button type="submit" class="btn-primary">Post to Board</button>
                </form>
            </div>

            <h2 class="mt-3 mb-2 text-center">Community Board</h2>
            <div id="items-list">
                <!-- Dynamically populated -->
            </div>

        </div>

    </div>
   <script type="module" src="js/lost-found.js"></script>
</body>
</html>
